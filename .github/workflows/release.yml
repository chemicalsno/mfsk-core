name: Release

# Triggered by tags of the form `v0.1.0`, `v0.1.1`, `v0.2.0`, …
# (not `v1.0.0-rc.1` unless the matcher is widened).
on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+']

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish to crates.io + GitHub release
    runs-on: ubuntu-latest
    permissions:
      contents: write   # for creating the GitHub release
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # Tag must be reachable from main. ci.yml has already validated
      # every commit that landed on main (PRs gated by main
      # protection); refusing to publish a tag that points outside
      # main is enough to catch the "tagged a feature branch by
      # mistake" scenario without re-running the full test suite (the
      # 0.4.1 release added the embedded port and the slow-sweep
      # re-run there cost ~3 min per release for zero new signal).
      - name: Verify tag is reachable from main
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=200 origin main
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/main; then
            echo "::error::Tag commit ${GITHUB_SHA} is not an ancestor of origin/main; refusing to publish"
            exit 1
          fi

      # The tag version must match Cargo.toml's version field. Fail
      # fast if someone tags `v0.2.0` while Cargo.toml still says
      # `0.1.0`.
      - name: Check tag matches Cargo.toml version
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/v}"
          CARGO_VERSION=$(awk -F'"' '/^version[[:space:]]*=/ { print $2; exit }' mfsk-core/Cargo.toml)
          if [ "$TAG" != "$CARGO_VERSION" ]; then
            echo "::error::Tag v$TAG does not match Cargo.toml version $CARGO_VERSION"
            exit 1
          fi

      - name: Publish to crates.io (--features full)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        # Mirrors ci.yml's publish-dry-run: use --features full so the
        # in-package verification compile exercises every feature-gated
        # module (FT8/FT4/FST4/WSPR/JT9/JT65/Q65). Source is the same
        # either way; this just makes the verification more stringent.
        run: cargo publish -p mfsk-core --features full

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            Published to crates.io as [`mfsk-core ${{ github.ref_name }}`](https://crates.io/crates/mfsk-core).

            Release notes are auto-generated from merged PRs; see the crate's
            [CHANGELOG.md](https://github.com/jl1nie/mfsk-core/blob/main/CHANGELOG.md)
            for curated release notes.

            **Prebuilt `mfsk-ffi-ft8` binaries** (FT8 C ABI) are attached
            below for users who want to drop the decoder into a non-Rust
            project without setting up the cross-toolchain themselves —
            see [`docs/EMBEDDED.md`](https://github.com/jl1nie/mfsk-core/blob/main/docs/EMBEDDED.md)
            for the integration guide.

  # ── mfsk-ffi-ft8 prebuilt binaries ─────────────────────────────────
  #
  # Attach `libmfsk_ft8.{a,so,dylib}` + `mfsk_ft8.h` to the GitHub
  # release so non-Rust C/C++ users can drop the FT8 decoder into an
  # ESP-IDF / desktop project without installing the +esp toolchain.
  # All three jobs upload to the same release as the `publish` job's
  # `softprops/action-gh-release@v2` (idempotent append).

  release-ffi-host:
    name: mfsk-ffi-ft8 — host (linux-x86_64)
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build -p mfsk-ffi-ft8 --release
      - name: Package
        run: |
          set -euo pipefail
          PKG=mfsk-ffi-ft8-${GITHUB_REF#refs/tags/}-linux-x86_64
          mkdir -p "$PKG"/{lib,include}
          cp target/release/libmfsk_ft8.so "$PKG"/lib/
          cp target/release/libmfsk_ft8.a  "$PKG"/lib/
          cp mfsk-ffi-ft8/include/mfsk_ft8.h "$PKG"/include/
          cp mfsk-ffi-ft8/README.md          "$PKG"/ 2>/dev/null || true
          cp mfsk-ffi-ft8/tests/c_smoke/smoke.c "$PKG"/
          tar -czvf "$PKG".tar.gz "$PKG"
      - uses: softprops/action-gh-release@v2
        with:
          files: mfsk-ffi-ft8-*-linux-x86_64.tar.gz
          fail_on_unmatched_files: true

  release-ffi-esp32:
    name: mfsk-ffi-ft8 — Xtensa ESP32 (`libmfsk_ft8.a`)
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Install Xtensa Rust toolchain (+esp)
        uses: esp-rs/xtensa-toolchain@v1.5
        with:
          default: true
          buildtargets: esp32
          ldproxy: false
      - uses: Swatinem/rust-cache@v2
      - name: Build static lib for xtensa-esp32-espidf
        # The +esp toolchain ships rust-src but no precompiled core
        # for `xtensa-esp32-espidf`; `-Z build-std=core,alloc,panic_abort`
        # builds the missing crates from source. Mirrors the
        # m5stack-core2 example's `.cargo/config.toml` `[unstable]
        # build-std` setting.
        env:
          RUSTFLAGS: "-C panic=abort"
        run: |
          cargo +esp build -p mfsk-ffi-ft8 --release \
              --no-default-features \
              --features embedded-fixed-point,embedded-runtime \
              --target xtensa-esp32-espidf \
              -Z build-std=core,alloc,panic_abort
      - name: Package
        run: |
          set -euo pipefail
          PKG=mfsk-ffi-ft8-${GITHUB_REF#refs/tags/}-esp32-xtensa
          mkdir -p "$PKG"/{lib,include}
          cp target/xtensa-esp32-espidf/release/libmfsk_ft8.a "$PKG"/lib/
          cp mfsk-ffi-ft8/include/mfsk_ft8.h "$PKG"/include/
          cp mfsk-ffi-ft8/README.md          "$PKG"/ 2>/dev/null || true
          tar -czvf "$PKG".tar.gz "$PKG"
      - uses: softprops/action-gh-release@v2
        with:
          files: mfsk-ffi-ft8-*-esp32-xtensa.tar.gz
          fail_on_unmatched_files: true

  release-ffi-esp32s3:
    name: mfsk-ffi-ft8 — Xtensa ESP32-S3 (`libmfsk_ft8.a`)
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Install Xtensa Rust toolchain (+esp)
        uses: esp-rs/xtensa-toolchain@v1.5
        with:
          default: true
          buildtargets: esp32s3
          ldproxy: false
      - uses: Swatinem/rust-cache@v2
      - name: Build static lib for xtensa-esp32s3-espidf
        # See the esp32 job for why `-Z build-std=...` is needed.
        env:
          RUSTFLAGS: "-C panic=abort"
        run: |
          cargo +esp build -p mfsk-ffi-ft8 --release \
              --no-default-features \
              --features embedded-fixed-point,embedded-runtime \
              --target xtensa-esp32s3-espidf \
              -Z build-std=core,alloc,panic_abort
      - name: Package
        run: |
          set -euo pipefail
          PKG=mfsk-ffi-ft8-${GITHUB_REF#refs/tags/}-esp32s3-xtensa
          mkdir -p "$PKG"/{lib,include}
          cp target/xtensa-esp32s3-espidf/release/libmfsk_ft8.a "$PKG"/lib/
          cp mfsk-ffi-ft8/include/mfsk_ft8.h "$PKG"/include/
          cp mfsk-ffi-ft8/README.md          "$PKG"/ 2>/dev/null || true
          tar -czvf "$PKG".tar.gz "$PKG"
      - uses: softprops/action-gh-release@v2
        with:
          files: mfsk-ffi-ft8-*-esp32s3-xtensa.tar.gz
          fail_on_unmatched_files: true
