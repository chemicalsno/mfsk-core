name: CI

on:
  push:
    branches: [main]
    # `embedded-poc/**` are stand-alone xtensa / cortex-m binary
    # crates with their own toolchains. Excluded from the host
    # workspace and not built by host CI; skip the workflow if the
    # only changes are inside that tree.
    paths-ignore:
      - 'embedded-poc/**'
  pull_request:
    paths-ignore:
      - 'embedded-poc/**'

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  # Opt every JS-based action into the Node.js 24 runtime ahead of
  # GitHub's 2026-09-16 deprecation of Node 20. Lets us keep the
  # actions pinned at @v4 / @v2 / @v1.5 without chasing individual
  # release bumps; the action authors will republish Node-24-native
  # versions over time and this env var becomes a no-op.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Cancel in-flight runs on the same ref when a new commit arrives
# (typical case: a PR force-push or a fast-follow `--amend`). The
# group key uses `head_ref` for `pull_request` events (the source
# branch) and falls back to `ref` for `push` events on `main`. This
# does NOT dedupe the PR-vs-post-merge pair (different refs), but it
# does prevent run pile-ups on rapid PR iterations.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ───────────────────────────────────────────────────────────────
  # Formatting + clippy lint gate. Fast fail so the heavier matrix
  # jobs don't burn runner minutes on a branch that wouldn't pass
  # the style fence anyway.
  # ───────────────────────────────────────────────────────────────
  lint:
    name: rustfmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable, with rustfmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy -- -D warnings
        run: cargo clippy --workspace --all-targets --features full --no-deps -- -D warnings

  # ───────────────────────────────────────────────────────────────
  # Core: build + full test suite on the "full" feature set.
  # This is the single must-pass job; everything else is narrower
  # verification.
  # ───────────────────────────────────────────────────────────────
  test:
    name: Test (features = full)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build (full)
        run: cargo build -p mfsk-core --features full --release

      # `--include-ignored` makes the heavy synthetic SNR / AP / fast-
      # fading sweeps (marked `#[ignore = "slow: ..."]`) and the
      # diagnostic perf tests run as part of CI. They're skipped by
      # default for local `cargo test` because debug-mode runs take
      # 10+ minutes; in release CI mode they finish in a few minutes.
      - name: Test (full, including slow sweeps)
        run: cargo test -p mfsk-core --features full --release -- --include-ignored

      - name: Test (FST4 gated roundtrip)
        env:
          RUN_FST4_ROUNDTRIP: "1"
        run: cargo test -p mfsk-core --features full --release synth_decode_roundtrip_cq_ja1abc

  # ───────────────────────────────────────────────────────────────
  # Feature matrix: every single-protocol feature must compile on
  # its own (no-default-features + exactly one protocol). Catches
  # cross-feature dependencies that only show up when a particular
  # combination is disabled.
  # ───────────────────────────────────────────────────────────────
  feature-matrix:
    name: Build (${{ matrix.features }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features:
          - ""           # no features at all — foundation-only
          - "ft8"
          - "ft4"
          - "fst4"
          - "wspr"
          - "jt9"
          - "jt65"
          - "q65"
          - "uvpacket"
          - "embedded-tx"  # no_std + alloc TX preset (host-side compile only)
          - "embedded-rx"  # no_std + alloc RX preset (pulls fft-extern)
          - "full"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: |
          if [ -z "${{ matrix.features }}" ]; then
            cargo build -p mfsk-core --no-default-features --release
          else
            cargo build -p mfsk-core --no-default-features --features "${{ matrix.features }}" --release
          fi

  # ───────────────────────────────────────────────────────────────
  # mfsk-ffi: cdylib build + C++ driver (encode/decode for every
  # protocol + multi-threaded stress). Doesn't publish to crates.io
  # but is the real ABI that C/C++/Kotlin consumers link against,
  # so regressions here need catching.
  # ───────────────────────────────────────────────────────────────
  ffi:
    name: mfsk-ffi + C++ driver
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build mfsk-ffi
        run: cargo build -p mfsk-ffi --release

      - name: Run C++ driver (default + multi-thread tests)
        run: bash mfsk-ffi/examples/cpp_smoke/build.sh

      - name: Run C++ driver (including gated FST4 roundtrip)
        env:
          RUN_FST4_ROUNDTRIP: "1"
        run: |
          cd mfsk-ffi/examples/cpp_smoke
          ./cpp_smoke

  # ───────────────────────────────────────────────────────────────
  # rustdoc: catches broken intra-doc links and missing-example
  # compile failures. The --no-deps limits doc generation to our
  # own crate (not the full dep tree).
  # ───────────────────────────────────────────────────────────────
  docs:
    name: rustdoc
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build docs (features = full)
        run: cargo doc -p mfsk-core --features full --no-deps

  # ───────────────────────────────────────────────────────────────
  # cargo publish dry-run: catches crates.io-specific issues
  # (missing metadata, path deps without version, oversized
  # tarball) before the real publish workflow tries to upload.
  # ───────────────────────────────────────────────────────────────
  publish-dry-run:
    name: cargo publish --dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Dry run (--features full)
        # Run the dry-run with every protocol feature enabled so a
        # feature-gated module that fails to compile in isolation
        # still trips this gate before the real publish step.
        run: cargo publish -p mfsk-core --features full --dry-run
